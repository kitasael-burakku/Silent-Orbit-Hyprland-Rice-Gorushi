# BACKGROUND
background {
    monitor =
    path = ~/.config/hyprlock/wallpapers/1.png
    blur_passes = 1 # Un poco más de blur ayuda a que el texto blanco sea más legible
    blur_size = 6
    contrast = 1.0
    brightness = 0.4 
    vibrancy = 0.2
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
    hide_cursor = true
}

# TIME (Reloj principal - Monocromático refinado)
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 1.0)
    font_size = 110
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 160, 280
    halign = left
    valign = center
    shadow_passes = 3
    shadow_size = 5
}

# DATE (Subtítulo elegante)
label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %d de %B")"
    color = rgba(255, 255, 255, 0.7)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 170, 180
    halign = left
    valign = center
}

# GREETINGS (Mensaje de bienvenida)
label {
    monitor =
    text = Welcome back, <span foreground="##ffffff">$USER</span>
    color = rgba(179, 179, 179, 0.9)
    font_size = 28
    font_family = JetBrainsMono Nerd Font Bold
    position = 170, 120
    halign = left
    valign = center
}

# USER-BOX / STATUS (Minimalista sin avatar)
shape {
    monitor =
    size = 300, 50
    color = rgba(255, 255, 255, 0.1) # Glass claro
    rounding = 10
    border_size = 1
    border_color = rgba(255, 255, 255, 0.2)
    position = 170, -80
    halign = left
    valign = center
}

# USERNAME & ICON
label {
    monitor =
    text =   $USER
    color = rgba(255, 255, 255, 0.8)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 200, -80
    halign = left
    valign = center
}

# INPUT FIELD (Acento de color funcional)
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(0, 0, 0, 0.4) 
    font_color = rgba(255, 255, 255, 1.0)
    
    # EFECTO MÁGICO AQUÍ:
    fade_on_empty = true
    placeholder_text = # Vacío para que sea totalmente invisible al inicio
    
    hide_input = false
    
    # Colores de estado
    check_color = rgba(255, 255, 255, 0.5) 
    fail_color = rgba(255, 51, 51, 0.8)    
    capslock_color = rgba(255, 165, 0, 0.8) 
    
    position = 170, -150
    halign = left
    valign = center
}