# в”Җв”Җ Estructura MonocromГЎtica в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

format = """
[оӮ¶](fg:#1a1a1a)\
$username\
$hostname\
[оӮҙ](fg:#1a1a1a bg:#333333)\
$directory\
[оӮҙ](fg:#333333 bg:#4d4d4d)\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$cmd_duration\
[оӮҙ](fg:#4d4d4d)\
\n$character"""

add_newline = true

# в”Җв”Җ Usuario y Host (Fondo Negro Intenso) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[username]
show_always = true
style_user = "bg:#1a1a1a fg:#ffffff bold" 
style_root = "bg:#1a1a1a fg:#ff4f5e bold" # Rojo solo para root por seguridad
format = '[$user]($style)'

[hostname]
ssh_only = false
style = "bg:#1a1a1a fg:#a0a0a0"
format = '[@$hostname]($style)'

# в”Җв”Җ Directorio (Fondo Gris Oscuro) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[directory]
style = "bg:#333333 fg:#ffffff"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"Projects" = "уұҢў "
"Code" = "п„Ў "

# в”Җв”Җ Git y Lenguajes (Fondo Gris Medio) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[git_branch]
symbol = "у°Ҡў "
style = "bg:#4d4d4d fg:#ffffff"
format = "[[ $symbol$branch ]($style)]($style)"

[git_status]
style = "bg:#4d4d4d fg:#ffffff"
format = "[[($all_status$ahead_behind)]($style)]($style)"

[python]
symbol = "оҳҶ "
style = "bg:#4d4d4d fg:#e0e0e0"
format = '[[ $symbol($version )]($style)]($style)'

[nodejs]
symbol = "оңҳ "
style = "bg:#4d4d4d fg:#e0e0e0"
format = '[[ $symbol($version )]($style)]($style)'

[rust]
symbol = "оһЁ "
style = "bg:#4d4d4d fg:#e0e0e0"
format = '[[ $symbol($version )]($style)]($style)'

# в”Җв”Җ DuraciГіn y Prompt в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[cmd_duration]
min_time = 2_000
style = "bg:#4d4d4d fg:#a0a0a0 italic"
format = "[[ уұҺ« $duration ]($style)]($style)"

[character]
success_symbol = "[ пҢғ](bold #ffffff)"
error_symbol   = "[ п‘§](bold #ff4f5e)"